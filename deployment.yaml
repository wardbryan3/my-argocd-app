apiVersion: apps/v1
kind: Deployment
metadata:
    name: hello-world
    spec:
        replicas: 2
          selector:
                matchLabels:
                        app: hello-world
                          template:
                                metadata:
                                        labels:
                                                  app: hello-world
                                                      spec:
                                                              containers:
                                                                      - name: nginx
                                                                              image: nginx:latest
                                                                                      ports:
                                                                                                - containerPort: 80
                                                                                                ---
                                                                                      apiVersion: v1
                                                                                      kind: Service
                                                                                      metadata:
                                                                                          name: hello-world-service
                                                                                          spec:
                                                                                              selector:
                                                                                                    app: hello-world
                                                                                                      ports:
                                                                                                          - port: 80
                                                                                                              targetPort: 80
                                                                                                                type: ClusterIP
